    <dialog class="viewer" aria-label="Video viewer">
      <button class="viewer__close" type="button" aria-label="Close video">x</button>
      <video class="viewer__video" playsinline preload="metadata"></video>
      <div class="viewer__controls" aria-label="Video controls">
        <button class="viewer__toggle" type="button" aria-label="Play video">PLAY</button>
        <input class="viewer__scrub" type="range" min="0" max="100" value="0" step="0.1" aria-label="Scrub video" />
        <label class="viewer__volume-wrap"><span>VOL</span><input class="viewer__volume" type="range" min="0" max="1" value="1" step="0.01" aria-label="Volume" /></label>
        <button class="viewer__mute" type="button" aria-label="Toggle sound">SOUND</button>
      </div>
      <p class="viewer__title"></p>
    </dialog>
